name: Build Executables

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            add_data_sep: ";"
            icon_flag: "--icon icon.ico"
            artifact_name: wordguesser-windows
          - os: macos-latest
            add_data_sep: ":"
            icon_flag: "--icon icon.icns"
            artifact_name: wordguesser-macos
          - os: ubuntu-latest
            add_data_sep: ":"
            icon_flag: ""
            artifact_name: wordguesser-linux

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: local

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install Linux Tk dependency
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: uv sync

      - name: Build executable
        run: uv run pyinstaller --onefile --windowed --noupx --add-data "words.txt${{ matrix.add_data_sep }}." ${{ matrix.icon_flag }} UI.py

      - name: Package output
        shell: bash
        run: |
          cd dist
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv UI.exe ${{ matrix.artifact_name }}.exe
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            mv UI.app ${{ matrix.artifact_name }}.app
            zip -r ${{ matrix.artifact_name }}.zip ${{ matrix.artifact_name }}.app
            rm -rf ${{ matrix.artifact_name }}.app
            rm -f UI
          else
            mv UI ${{ matrix.artifact_name }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: local/dist/${{ matrix.artifact_name }}*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
