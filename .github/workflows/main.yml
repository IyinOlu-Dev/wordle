name: Build Executables

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            add_data_sep: ";"
            icon_flag: "--icon icon.ico"
            artifact_name: wordguesser-windows
          - os: macos-latest
            add_data_sep: ":"
            icon_flag: "--icon icon.icns"
            artifact_name: wordguesser-macos
          - os: ubuntu-latest
            add_data_sep: ":"
            icon_flag: ""
            artifact_name: wordguesser-linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install Linux Tk dependency
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: uv sync

      - name: Build executable
        run: uv run pyinstaller --onefile --windowed --add-data "words.txt${{ matrix.add_data_sep }}." ${{ matrix.icon_flag }} UI.py

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*
